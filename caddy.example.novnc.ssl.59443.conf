{
    auto_https off
    log {
        output stderr
        level INFO

}
}
https://:59443 {
    respond /robots.txt "User-agent: *`n`Disallow: /" 200 {
        close
    }
    @favicon { 
    path /favicon.ico /favicon.png
    }
    handle @favicon {
       rewrite * /favicon.png
       file_server {
           root ./www
       }
    }
    redir /           /launch/index.html
    redir /index.html /launch/index.html
    @static { 
    path /launch/*  /launch/
    }
    handle @static {
       file_server {
            root ./www

       }
    }
## example when started with port 55554 ## here we have novnc on 55555
## websocket still on 8081 internal
       tls { 
           on_demand
           issuer internal
        }
   	basic_auth /* {
##### example ./config/htpass.caddy   
#    		# Username "Bob", password "hiccup"
#   		Bob $2a$14$Zkx19XLiW6VYouLHR5NmfOFU0z2GTNmpkT/5qqR7hx4IjWJPDhjvG
       import ./config/htpass.caddy
   	}

	#respond /secret/* "Access denied" 403 {
	#	close
	#}
	respond /is_online "OK: ALIVE" 200 {
		close
	}
    @keysws {
        path /ws
    }
    handle @keysws  { 
        reverse_proxy http://127.0.0.1:8081 {
              header_up Host {http.reverse_proxy.upstream.hostport}
              header_up X-Real-IP {http.reverse-proxy.upstream.address}
              header_up X-Forwarded-Port {http.request.port}
        }
    }
    @keys {
        path /mouse.js /keys
        path /script.js /style.css
        path /keyboard-config.js /keyboard.js
    }
    handle  @keys { 
        rewrite /keys /
        reverse_proxy http://127.0.0.1:55554 {
              header_up Host {http.reverse_proxy.upstream.hostport}
              header_up X-Real-IP {http.reverse-proxy.upstream.address}
              header_up X-Forwarded-Port {http.request.port}
        }
    }
    
    handle /* { 
    reverse_proxy http://127.0.0.1:55555 {
              header_up Host {http.reverse_proxy.upstream.hostport}
              header_up X-Real-IP {http.reverse-proxy.upstream.address}
              header_up X-Forwarded-Port {http.request.port}
    }
    }

}
